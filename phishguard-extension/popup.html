<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishGuard</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <span class="logo-icon">🛡️</span>
    PhishGuard
  </div>
  <div class="status-badge" id="main-status-badge">
    <div class="status-dot"></div>
    ACTIVE
  </div>
</div>

<!-- Current Tab -->
<div class="section">
  <div class="section-title">Current Tab</div>
  <div class="tab-card">
    <div class="tab-status">
      <span class="tab-status-label status-loading" id="tab-status-label">
        ⏳ Scanning...
      </span>
      <span class="scanning-text" id="scanning-text">analyzing</span>
    </div>
    <div class="tab-url" id="tab-url">Detecting current tab...</div>
    <div class="risk-bar-container">
      <div class="risk-bar" id="risk-bar" style="width:0%;background:#58a6ff"></div>
    </div>
    <div class="risk-score-row">
      <span>Risk Score</span>
      <span id="risk-score-val">—</span>
    </div>
  </div>
</div>

<!-- Today's Stats -->
<div class="section">
  <div class="section-title">Today's Protection</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="stat-blocked" style="color:#f85149">—</div>
      <div class="stat-label">🔴 Blocked</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-suspicious" style="color:#d29922">—</div>
      <div class="stat-label">🟡 Suspicious</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-safe" style="color:#3fb950">—</div>
      <div class="stat-label">✅ Safe</div>
    </div>
  </div>
</div>

<!-- Recent Threats -->
<div class="section">
  <div class="section-title">Recent Threats</div>
  <div class="threat-list" id="threat-list">
    <div class="no-threats">✅ No recent threats</div>
  </div>
</div>

<!-- System Status -->
<div class="section">
  <div class="section-title">System Status</div>
  <div class="backend-row">
    <span>🤖 AI Engine</span>
    <span id="sys-api" style="color:#8b949e">Checking...</span>
  </div>
  <div class="backend-row">
    <span>🧠 CNN Model</span>
    <span id="sys-cnn" style="color:#8b949e">Checking...</span>
  </div>
  <div class="backend-row">
    <span>🛡️ URLs Blocked</span>
    <span id="sys-blocked-total" style="color:#f85149">—</span>
  </div>
</div>

<!-- Buttons — NO onclick here, handled in popup.js -->
<div class="btn-row">
  <button class="btn btn-primary" id="scan-btn">🔍 Scan Page</button>
  <button class="btn btn-secondary" id="dashboard-btn">📊 Dashboard</button>
</div>

<!-- External JS only — no inline script allowed in MV3 -->
<script src="popup.js"></script>
</body>
</html>
