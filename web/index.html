<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard Cyber SOC Dashboard</title>
  <!-- Prevent favicon 404 -->
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Using cdnjs to avoid jsdelivr tracking prevention blocks -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white font-sans antialiased h-screen overflow-hidden flex">
  
  <div class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col pointer-events-auto z-10 neon-border-right">
    <div class="p-6">
      <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500 neon-text">🛡 PhishGuard</h1>
      <p class="text-xs text-cyan-500 uppercase tracking-widest mt-1">Cyber SOC</p>
    </div>
    
    <nav class="flex-1 mt-6">
      <a href="#" class="block px-6 py-3 text-cyan-400 bg-gray-700/50 border-l-4 border-cyan-400 transition-colors">
        📊 Dashboard
      </a>
      <a href="#" class="block px-6 py-3 hover:text-cyan-400 hover:bg-gray-700/30 border-l-4 border-transparent transition-colors">
        🔍 URL Scanner
      </a>
      <a href="#" class="block px-6 py-3 hover:text-cyan-400 hover:bg-gray-700/30 border-l-4 border-transparent transition-colors">
        📋 Incidents
      </a>
    </nav>
    
    <div class="p-6">
      <div id="ws-status" class="flex items-center text-xs text-gray-400">
        <span class="w-2 h-2 rounded-full bg-red-500 mr-2 pulse-dot"></span> Offline
      </div>
    </div>
  </div>

  <div class="flex-1 flex flex-col h-full overflow-y-auto w-full relative">
    <div class="absolute inset-0 scanner-grid opacity-10 pointer-events-none"></div>
    
    <header class="h-16 border-b border-gray-700 flex items-center justify-between px-8 bg-gray-800/80 backdrop-blur">
      <h2 class="text-xl font-semibold text-gray-200">System Overview</h2>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-400" id="clock">00:00:00</span>
      </div>
    </header>

    <main class="flex-1 p-8">
      <div class="grid grid-cols-4 gap-6 mb-8">
        <div class="stat-card bg-gray-800 rounded-xl p-6 border border-gray-700 neon-box">
          <p class="text-sm text-gray-400 uppercase tracking-wider">Emails Scanned</p>
          <div class="flex justify-between items-end mt-2">
            <h3 class="text-4xl font-bold text-white" id="stat-total">0</h3>
            <span class="text-2xl opacity-50">📧</span>
          </div>
        </div>
        <div class="stat-card bg-gray-800 rounded-xl p-6 border border-gray-700 neon-box">
          <p class="text-sm text-amber-500 uppercase tracking-wider">Threats Detected</p>
          <div class="flex justify-between items-end mt-2">
            <h3 class="text-4xl font-bold text-amber-400" id="stat-threats">0</h3>
            <span class="text-2xl opacity-50">⚠️</span>
          </div>
        </div>
        <div class="stat-card bg-gray-800 rounded-xl p-6 border border-gray-700 neon-box">
          <p class="text-sm text-red-500 uppercase tracking-wider">URLs Blocked</p>
          <div class="flex justify-between items-end mt-2">
            <h3 class="text-4xl font-bold text-red-400" id="stat-blocked">0</h3>
            <span class="text-2xl opacity-50">🚫</span>
          </div>
        </div>
        <div class="stat-card bg-gray-800 rounded-xl p-6 border border-gray-700 neon-box">
          <p class="text-sm text-emerald-500 uppercase tracking-wider">Avg Risk Score</p>
          <div class="flex justify-between items-end mt-2">
            <h3 class="text-4xl font-bold text-emerald-400"><span id="stat-avg">0</span>%</h3>
            <span class="text-2xl opacity-50">📊</span>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-6">
        <div class="col-span-1 bg-gray-800 rounded-xl p-6 border border-gray-700 text-center relative overflow-hidden h-64 neon-box">
          <h4 class="text-sm text-gray-400 uppercase tracking-wider mb-4">Detection Breakdown</h4>
          <div class="relative w-full h-40 flex justify-center">
            <canvas id="pieChart"></canvas>
          </div>
        </div>
        
        <div class="col-span-2 bg-gray-800 rounded-xl border border-gray-700 overflow-hidden flex flex-col neon-box h-64">
          <div class="px-6 py-4 border-b border-gray-700 bg-gray-800/50">
            <h4 class="text-sm text-gray-400 uppercase tracking-wider flex items-center gap-2">
              <span class="text-cyan-400">⚡</span> Recent Incidents
            </h4>
          </div>
          <div class="flex-1 overflow-y-auto w-full">
            <table class="w-full text-left text-sm table-fixed">
              <thead class="text-gray-400 bg-gray-700/30 sticky top-0">
                <tr>
                  <th class="px-6 py-3 font-medium w-1/4">Sender</th>
                  <th class="px-6 py-3 font-medium w-2/4">URL Highlight</th>
                  <th class="px-6 py-3 font-medium w-1/8">Score</th>
                  <th class="px-6 py-3 font-medium w-1/8">Decision</th>
                </tr>
              </thead>
              <tbody id="incidents-body" class="divide-y divide-gray-700/50">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
